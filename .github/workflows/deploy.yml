name: "Godot Web Deploy"
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  export_web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot 4.6 & Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip -q Godot_v4.6-stable_linux.x86_64.zip
          mv Godot_v4.6-stable_linux.x86_64 godot
          chmod +x godot
          
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable/
          unzip -q Godot_v4.6-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Export Web Game
        run: |
          # 這裡我們已經知道目錄長怎樣，直接建立資料夾
          mkdir -p build/web
          
          # 精準呼叫你設定的 "Web" 預設值
          ./godot --headless --export-release "Web" build/web/index.html

      - name: Add COI Service Worker (credentialless)
        run: |
          cat > build/web/coi-serviceworker.min.js << 'COIEOF'
          if(typeof window==='undefined'){self.addEventListener("install",()=>self.skipWaiting());self.addEventListener("activate",(e)=>e.waitUntil(self.clients.claim()));self.addEventListener("fetch",function(e){if(e.request.cache==="only-if-cached"&&e.request.mode!=="same-origin")return;e.respondWith(fetch(e.request).then(r=>{if(r.status===0)return r;const h=new Headers(r.headers);h.set("Cross-Origin-Embedder-Policy","credentialless");h.set("Cross-Origin-Opener-Policy","same-origin");return new Response(r.body,{status:r.status,statusText:r.statusText,headers:h})}))});}else{if(window.crossOriginIsolated===false){const r=window.navigator.serviceWorker;if(r){r.register(window.document.currentScript.src).then(reg=>{if(reg.active&&!r.controller){window.location.reload();}else if(!reg.active){reg.addEventListener("updatefound",()=>{reg.installing.addEventListener("statechange",function(){if(this.state==="activated"){window.location.reload();}});});}})}}}
          COIEOF
          sed -i 's/<script/<script src="coi-serviceworker.min.js"><\/script><script/' build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages