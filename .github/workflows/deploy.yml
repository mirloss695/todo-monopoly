name: "Godot Web Deploy"
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  export_web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Godot Web Export
        uses: firebelley/godot-export@v5.2.1
        with:
          # 1. 改用官方 GitHub 穩定載點，解決下載逾時問題 (注意 linux.x86_64 檔名格式)
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          
          relative_project_path: ./
          
          # 2. 修正 Action 參數警告
          archive_output: false
          use_preset_export_path: true

      - name: Add COI Service Worker
        run: |
          wget https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js -O build/web/coi-serviceworker.min.js
          sed -i 's/<script/<script src="coi-serviceworker.min.js"><\/script><script/g' build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages